# CryptoCopilot — Stage 4 retrieval eval set.
#
# 20 questions across news (8), mechanism (8) and fundamental (4). The runner
# (backend RagLiveIT.retrievalEval) retrieves top-8 with the rule-based classifier's
# source_type filter (NO symbol filter — retrieval is judged honestly) and scores a
# question as a recall@8 "hit" when at least one of the 8 chunks satisfies all of:
#   - source_type in expected_source_types
#   - (expected_symbols empty)  OR  chunk.symbol in expected_symbols  OR  an expected
#     symbol appears in the chunk text
#   - (expected_keywords empty) OR  at least one expected_keyword appears in the chunk text
# It also records classifier accuracy vs expected_query_classification.
#
# NOTE: news-category recall scales with the news corpus (here ~124 rows over a ~4-day
# window). Mechanism (KB) and fundamental are stable; news is corpus-dependent.

questions:
  # ----------------------------- news (8) -----------------------------
  - id: n1
    category: news
    query: "Why is Bitcoin under selling pressure right now?"
    expected_keywords: ["bitcoin"]
    expected_symbols: ["BTC"]
    expected_source_types: ["news"]
    max_age_days: 14
    expected_query_classification: news
  - id: n2
    category: news
    query: "What is the current sentiment around Bitcoin?"
    expected_keywords: ["bitcoin", "sentiment"]
    expected_symbols: ["BTC"]
    expected_source_types: ["news"]
    max_age_days: 14
    expected_query_classification: news
  - id: n3
    category: news
    query: "What are people saying about XRP this week?"
