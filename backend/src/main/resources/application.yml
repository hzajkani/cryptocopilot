spring:
  application:
    name: cryptocopilot-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    # init.sql owns the schema (PROJECT.md §5). Hibernate must never create/alter it;
    # `validate` proves the JPA entities match the real tables and fails fast on drift.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

  # ===== Stage 4 RAG: Spring AI =====
  # ACTIVE provider: local Ollama for BOTH chat and embeddings — free, no API key
  # (see docs/OLLAMA_SETUP.md). Switch back to OpenAI by setting model.chat/embedding=openai
  # + pgvector.dimensions=1536, then POST /api/rag/reindex.
  ai:
    model:
      chat: ollama
      embedding: ollama
    ollama:
      # localhost on the host; the backend container overrides this to host.docker.internal
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        pull-model-strategy: never   # models are pulled manually — see docs/OLLAMA_SETUP.md
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2:3b}
          temperature: 0.0           # grounded, near-deterministic answers
      embedding:
        options:
          model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}   # 768-dim
    openai:
      # inactive (model.* selects ollama above); kept so switching back is config-only.
      api-key: ${OPENAI_API_KEY:not-used}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.0
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        # Spring AI creates and OWNS the vector_store table (do not hand-create it).
        initialize-schema: true
        dimensions: 768             # must match nomic-embed-text (Ollama)
        index-type: HNSW
        distance-type: COSINE_DISTANCE

# ===== Stage 5: paper trading + Analyst (all configurable; defaults match the spec) =====
cryptocopilot:
  trading:
    starting-balance: 10000   # USD seed for resetAccount
    slippage-bps: 5           # 0.05% MARKET slippage, applied against the trader
    fee-bps: 10               # 0.10% taker fee on every fill
    timeframe: 1h             # orders fill against the 1h OHLCV grid
  analyst:
    ml-confidence-threshold: 0.50   # τ: above this an ML UP/DOWN scores ±2 instead of ±1
  ml:
    # The Python ML/data service's FastAPI (ingest/train/predict triggers). localhost for local
    # dev; the backend container overrides this to the compose service name via ML_API_URL.
    base-url: ${ML_API_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
