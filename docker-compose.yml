services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cc
      POSTGRES_PASSWORD: ccpass
      POSTGRES_DB: cryptocopilot
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cc -d cryptocopilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  ml:
    build: ./ml
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://cc:ccpass@db:5432/cryptocopilot
    depends_on:
      db:
        condition: service_healthy
    # Stage 2 artifacts live on bind mounts so the model trained by one
    # `compose run` is visible to the next `predict` run and inspectable on the
    # host. Features stay Python-internal (parquet under data/processed/), never
    # the DB — only `predictions`/`prediction_drivers` cross the boundary.
    volumes:
      - ./ml/models:/app/models     # calibrated bundle (models/v1/) + MODEL_CARD
      - ./ml/data:/app/data         # data/processed/features_*.parquet cache
      - ./ml/reports:/app/reports   # shap_summary.png, backtest_ml_v1*
    # batch worker: default command sleeps (scheduler loop); jobs are run via `docker compose run`
    command: ["python", "-m", "ml.scheduler"]

  ml-api:
    # Same image as `ml`, but serves the FastAPI trigger layer (ml/ml/api.py) so the
    # backend (and, through it, the UI) can launch ingest/train/predict on demand.
    # Shares the SAME bind-mounted artifacts as the scheduler, so a model trained
    # from the UI is exactly the one `predict` loads.
    build: ./ml
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://cc:ccpass@db:5432/cryptocopilot
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ml/models:/app/models
      - ./ml/data:/app/data
      - ./ml/reports:/app/reports
    command: ["uvicorn", "ml.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["8000:8000"]   # also exposes Swagger at http://localhost:8000/docs for dev
    healthcheck:
      # python:3.11-slim has no curl; urllib is always present.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build: ./backend
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cryptocopilot
      SPRING_DATASOURCE_USERNAME: cc
      SPRING_DATASOURCE_PASSWORD: ccpass
      # The Python ML/data service's FastAPI (ingest/train/predict triggers).
      ML_API_URL: http://ml-api:8000
      # Stage 4 RAG runs on a LOCAL Ollama on the host (free, no API key). The container
      # reaches it via host.docker.internal. See docs/OLLAMA_SETUP.md.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-not-used}   # set (sk-...) to enable the UI Ollama/OpenAI toggle
    extra_hosts:
      # makes host.docker.internal resolve to the host on Linux (no-op on Docker Desktop)
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      ml-api:
        # started, not healthy — the backend tolerates the ML service being down
        # (the /api/ml/* endpoints return a clean 502) so boot is never blocked on it.
        condition: service_started
    ports: ["8080:8080"]
    # Actuator health gate so `make demo` (and the frontend below) only proceed once the
    # backend is actually serving. start_period covers Spring Boot boot + JPA validate (~5s).
    healthcheck:
      # 127.0.0.1 (not localhost) — inside the container localhost can resolve to IPv6 [::1]
      # while the server binds IPv4, which fails the check.
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build: ./frontend
    # nginx serves the React build AND reverse-proxies /api -> backend:8080, so
    # the browser only ever talks to this single origin — no CORS needed on the
    # Spring Boot side (PROJECT.md §2). See frontend/nginx.conf.
    depends_on:
      backend:
        condition: service_healthy
    ports: ["3000:80"]
    # busybox wget ships in nginx:alpine — a plain 200 on / proves nginx is serving the SPA.
    # 127.0.0.1 (not localhost): busybox wget tries only the first resolved address, and
    # localhost can resolve to IPv6 [::1] where nginx (IPv4-only) is not listening.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:

# Containers: db (Stage 1), ml (Stage 1/2 scheduler/batch), ml-api (Stage 1/2 on-demand
# FastAPI triggers), backend (Stage 3-5), frontend (Stage 6 — React + nginx).
# See PROJECT.md §7 (build roadmap).
