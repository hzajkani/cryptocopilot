# nginx serves the React build AND reverse-proxies the API to the backend
# container, so the browser only ever talks to this single origin — no CORS
# config is needed on the Spring Boot side (PROJECT.md §2; Stage 6 brief).
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip the static bundle
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy REST calls to the backend service on the compose network.
    # A request for /api/markets is forwarded verbatim to backend:8080/api/markets.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # The Analyst/chat endpoints can be slow when they hit the LLM.
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
    }

    # SPA fallback: every non-file route renders index.html so react-router
    # can handle client-side navigation (e.g. a hard refresh on /analyst/BTC).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
